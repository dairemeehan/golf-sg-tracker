<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Daire Meehan's Golf Stats Tracker</title>
<meta name="theme-color" content="#0f1411" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SG Tracker" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" href="icons/icon-192.png" />
<style>
  :root{
    --bg:#0c100e; --panel:#161e19; --panel2:#1d2721; --line:#2a352e;
    --txt:#eaf1eb; --muted:#8ea293; --accent:#43c275; --accent2:#2f9d5b;
    --good:#4ccb73; --bad:#e86b54; --warn:#e6bb57;
    --radius:16px; --shadow:0 6px 20px rgba(0,0,0,.28); --shadow-sm:0 2px 8px rgba(0,0,0,.22);
    --glass:rgba(20,28,23,.72);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  html,body{margin:0;padding:0;color:var(--txt);
    background:
      radial-gradient(1100px 600px at 80% -10%, rgba(67,194,117,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 0%, rgba(67,194,117,.06), transparent 55%),
      var(--bg);
    background-attachment:fixed;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;letter-spacing:.1px}
  ::selection{background:rgba(67,194,117,.3)}
  html[data-theme="light"]{
    --bg:#eef2ee; --panel:#ffffff; --panel2:#f1f5f1; --line:#d8e0d8;
    --txt:#16201a; --muted:#5d6b60; --accent:#2f9d5b; --accent2:#268049;
    --good:#1f9d54; --bad:#cc4e36; --warn:#b88611;
    --shadow:0 6px 20px rgba(40,60,45,.10); --shadow-sm:0 2px 8px rgba(40,60,45,.08);
    --glass:rgba(255,255,255,.72);
  }
  html[data-theme="light"] body{
    background:
      radial-gradient(1100px 600px at 80% -10%, rgba(47,157,91,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 0%, rgba(47,157,91,.07), transparent 55%),
      var(--bg);
  }
  html[data-theme="light"] button.btn{color:#fff}
  html[data-theme="light"] nav button.active{color:#fff}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);
    background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);
    color:var(--txt);padding:11px 14px;border-radius:12px;display:flex;align-items:center;gap:12px;
    font-size:14px;z-index:50;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:92vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .toast button{background:transparent;border:none;color:var(--accent);font-weight:700;cursor:pointer;font-size:14px;padding:2px 4px}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:7px 10px;font-size:14px;cursor:pointer;transition:border-color .15s,background .15s}
  .iconbtn:hover{border-color:var(--accent)}
  .headtools{position:absolute;top:12px;right:14px;display:flex;gap:8px;align-items:center}
  header{position:sticky;top:0;z-index:10;
    background:var(--glass);backdrop-filter:saturate(160%) blur(12px);-webkit-backdrop-filter:saturate(160%) blur(12px);
    border-bottom:1px solid var(--line);padding:14px 16px}
  header h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:10px}
  header h1 .logo{width:32px;height:32px;border-radius:9px;flex:0 0 auto;box-shadow:var(--shadow-sm)}
  header .sub{color:var(--muted);font-size:12px;margin-top:3px}
  nav{display:flex;gap:6px;padding:9px 12px;
    background:var(--glass);backdrop-filter:saturate(160%) blur(12px);-webkit-backdrop-filter:saturate(160%) blur(12px);
    border-bottom:1px solid var(--line);position:sticky;top:57px;z-index:9;overflow-x:auto;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  nav button{flex:0 0 auto;background:transparent;border:1px solid transparent;color:var(--muted);
    padding:8px 14px;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;
    transition:background .18s,color .18s,border-color .18s}
  nav button:hover{color:var(--txt);background:rgba(255,255,255,.04)}
  nav button.active{background:linear-gradient(180deg,var(--accent),var(--accent2));color:#06210f;border-color:transparent;box-shadow:var(--shadow-sm)}
  main{padding:16px 16px 96px;max-width:760px;margin:0 auto}
  .card{background:linear-gradient(180deg,rgba(255,255,255,.025),transparent),var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:14px;box-shadow:var(--shadow);
    animation:rise .32s cubic-bezier(.2,.7,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.card{animation:none}}
  .card h2{margin:0 0 12px;font-size:15px;font-weight:700;letter-spacing:.2px;color:var(--txt)}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px;font-weight:500}
  input,select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:11px;border-radius:11px;font-size:16px;transition:border-color .15s,box-shadow .15s}
  input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,194,117,.16)}
  .row{display:flex;gap:10px}
  .row>div{flex:1}
  button.btn{background:linear-gradient(180deg,var(--accent),var(--accent2));border:none;color:#06210f;font-weight:700;
    padding:12px 14px;border-radius:12px;font-size:15px;cursor:pointer;width:100%;box-shadow:var(--shadow-sm);
    transition:transform .12s,filter .15s,box-shadow .15s}
  button.btn:hover{filter:brightness(1.06)}
  button.btn:active{transform:translateY(1px)}
  button.btn.secondary{background:var(--panel2);color:var(--txt);border:1px solid var(--line);font-weight:600;box-shadow:none}
  button.btn.secondary:hover{border-color:var(--accent);background:#222e26}
  button.btn.danger{background:transparent;color:var(--bad);border:1px solid rgba(232,107,84,.5);box-shadow:none}
  button.btn.danger:hover{background:rgba(232,107,84,.1)}
  button.btn.small{width:auto;padding:7px 12px;font-size:13px}
  .btnrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .btnrow>*{flex:1}
  .pill{display:inline-block;background:var(--panel2);border:1px solid var(--line);
    border-radius:999px;padding:4px 11px;font-size:12px;color:var(--muted);font-weight:500}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .sg-pos{color:var(--good)} .sg-neg{color:var(--bad)} .sg-zero{color:var(--muted)}
  .muted{color:var(--muted)}
  .big{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .stat{background:linear-gradient(180deg,rgba(255,255,255,.02),transparent),var(--panel2);
    border:1px solid var(--line);border-radius:13px;padding:12px;transition:border-color .15s,transform .15s}
  .stat:hover{border-color:#36473c;transform:translateY(-1px)}
  .stat .k{font-size:11px;color:var(--muted);font-weight:500}
  .stat .v{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:3px;letter-spacing:-.3px}
  .shotline{display:flex;align-items:center;gap:8px;padding:9px 6px;border-bottom:1px solid var(--line);font-size:14px}
  .shotline:last-child{border-bottom:none}
  .shotline .idx{width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    color:var(--muted);background:var(--panel2);border-radius:7px;font-size:12px;flex:0 0 auto}
  .shotline .desc{flex:1}
  .shotline .sg{width:60px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
  .hole-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px}
  .bar{height:9px;background:var(--panel2);border-radius:999px;overflow:hidden;position:relative}
  .bar>span{position:absolute;top:0;bottom:0;border-radius:999px;transition:width .5s cubic-bezier(.2,.7,.3,1)}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.45}
  details{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;background:var(--panel2);transition:border-color .15s}
  details[open]{border-color:#36473c}
  summary{cursor:pointer;font-size:14px;font-weight:500}
  .tag{font-size:11px;padding:2px 7px;border-radius:7px;border:1px solid var(--line);color:var(--muted);font-weight:600}
  .tag.ott{color:#7fd3ff;border-color:#2f5a73}
  .tag.app{color:#b69cff;border-color:#4a3f73}
  .tag.arg{color:#ffce7f;border-color:#735c2f}
  .tag.putt{color:#7fffc4;border-color:#2f7355}
  .center{text-align:center}
  .footnote{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5}
  .cloudbadge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;border:1px solid var(--line);vertical-align:middle;margin-left:6px;white-space:nowrap}
  .cloudbadge.off{color:var(--muted)}
  .cloudbadge.on{color:var(--good);border-color:#2f7355}
  .cloudbadge.saving{color:var(--warn);border-color:#735c2f}
  .cloudbadge.reconnect{color:#7fd3ff;border-color:#2f5a73}
  .cloudbadge.error{color:var(--bad);border-color:var(--bad)}
  .installbtn{background:var(--accent);color:#06210f;
    border:none;font-weight:700;padding:7px 12px;border-radius:999px;font-size:13px;cursor:pointer}
  .profrow{display:flex;align-items:center;gap:8px;margin-top:10px}
  .profrow label{margin:0;font-size:12px;color:var(--muted)}
  .profrow select{width:auto;flex:1;max-width:240px;padding:7px 10px;font-size:14px}
  .profbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:7px 10px;font-size:14px;cursor:pointer}
  header{position:sticky}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1><img class="logo" src="icons/icon-192.png" alt="DM SG logo"> Daire Meehan's Golf Stats Tracker <span id="cloudBadge" class="cloudbadge off" title="Cloud file sync status">● local only</span></h1>
  <div class="sub">Manual entry · auto-syncs to a cloud file you choose</div>
  <div class="headtools">
    <button id="themeBtn" class="iconbtn" title="Toggle light / dark">🌙</button>
    <button id="installBtn" class="installbtn" style="display:none">⬇ Install</button>
  </div>
  <div class="profrow">
    <label for="profileSel">Profile</label>
    <select id="profileSel"></select>
    <button id="profMgr" class="profbtn" title="Manage profiles">⚙</button>
  </div>
</header>
<nav id="nav">
  <button data-tab="play" class="active">Play</button>
  <button data-tab="summary">Summary</button>
  <button data-tab="stats">Stats</button>
  <button data-tab="history">History</button>
  <button data-tab="data">Data</button>
  <button data-tab="help">Help</button>
</nav>
<main id="main"></main>

<script>
"use strict";
/* ============================================================
   STROKES GAINED BENCHMARK TABLES (PGA Tour baseline)
   Source: Mark Broadie, "Every Shot Counts" (widely reproduced).
   Off-green distances in YARDS. Putting distances in FEET.
   Linear interpolation between points; flat extrapolation at ends.
   Editable & resettable from the Data tab.
   ============================================================ */
const DEFAULT_BENCH = {
  // distance(yds): [tee, fairway, rough, sand, recovery]
  offGreen: {
    cols:["tee","fairway","rough","sand","recovery"],
    rows:{
      10:[null,2.18,2.34,2.43,3.45],
      20:[null,2.40,2.59,2.53,3.45],
      30:[null,2.52,2.70,2.66,3.45],
      40:[null,2.60,2.78,2.82,3.45],
      50:[null,2.66,2.87,2.92,3.45],
      60:[null,2.70,2.91,3.15,3.45],
      80:[null,2.75,2.96,3.21,3.45],
      100:[2.92,2.80,2.92,3.21,3.45],
      120:[2.96,2.85,2.99,3.28,3.45],
      140:[2.93,2.91,3.05,3.33,3.45],
      160:[2.97,2.98,3.12,3.38,3.45],
      180:[3.02,3.08,3.21,3.44,3.45],
      200:[3.08,3.19,3.31,3.50,3.55],
      220:[3.15,3.30,3.42,3.59,3.66],
      240:[3.23,3.40,3.51,3.66,3.77],
      260:[3.32,3.51,3.61,3.74,3.83],
      280:[3.42,3.62,3.71,3.83,3.93],
      300:[3.51,3.73,3.80,3.92,4.02],
      320:[3.61,3.84,3.89,4.01,4.11],
      340:[3.71,3.95,3.98,4.10,4.20]
    }
  },
  // putting distance(feet): strokes
  putt:{
    1:1.001,2:1.009,3:1.053,4:1.147,5:1.234,6:1.323,7:1.395,8:1.456,
    9:1.516,10:1.563,12:1.653,15:1.744,18:1.815,20:1.858,25:1.951,
    30:2.012,35:2.061,40:2.092,45:2.123,50:2.150,60:2.225,70:2.290,
    90:2.400
  }
};

/* ===================== SEED COURSE LIBRARY =====================
   Reusable course layouts so you don't re-enter holes every round.
   IMPORTANT: the famous Irish courses below carry the correct TOTAL par
   but a STANDARD hole-by-hole layout (default yardages) — NOT the exact
   scorecard. They're labelled "default layout"; edit pars/yardages once
   to match the real card, then save. Your own saved courses are exact.
   (No free public per-hole dataset exists: OSM coverage is sparse and the
   Golf Ireland / DotGolf ISV API is gated behind club credentials.)
   ============================================================ */
const BASE_PARS = {
  72:[4,5,4,3,4,4,3,5,4, 4,4,3,5,4,4,3,4,5],
  71:[4,4,4,3,4,4,3,5,4, 4,4,3,5,4,4,3,4,5],
  70:[4,4,4,3,4,4,3,5,4, 4,4,3,5,4,4,3,4,4]
};
const PAR_YDS = {3:175, 4:405, 5:530};
function holesFromPars(pars){ return pars.map(p=>({par:p, yds:PAR_YDS[p]||400})); }
function seedIrish(id,name,par){ return {id, name, region:"Ireland", par, holes:holesFromPars(BASE_PARS[par]||BASE_PARS[72]), verified:false}; }
const SEED_COURSES = [
  seedIrish(1001,"Lahinch (Old Course)",72),
  seedIrish(1002,"Royal County Down (Championship)",71),
  seedIrish(1003,"Royal Portrush (Dunluce)",72),
  seedIrish(1004,"Portmarnock (Championship)",72),
  seedIrish(1005,"Ballybunion (Old Course)",71),
  seedIrish(1006,"The K Club (Palmer)",72),
  seedIrish(1007,"Old Head of Kinsale",72),
  seedIrish(1008,"Adare Manor",72),
  seedIrish(1009,"County Sligo (Rosses Point)",71),
  seedIrish(1010,"Waterville",72),
  {id:1100,name:"Standard Par 72",region:"Template",par:72,holes:holesFromPars(BASE_PARS[72]),verified:true},
  {id:1101,name:"Standard Par 71",region:"Template",par:71,holes:holesFromPars(BASE_PARS[71]),verified:true},
  {id:1102,name:"Standard Par 70",region:"Template",par:70,holes:holesFromPars(BASE_PARS[70]),verified:true}
];
const LS_ROUNDS="sg_rounds_v1", LS_BENCH="sg_bench_v1", LS_DRAFT="sg_draft_v1", LS_COURSES="sg_courses_v1",
      LS_PROFILES="sg_profiles_v1", LS_ACTIVEPROF="sg_active_profile_v1";
let bench = loadBench();
let rounds = loadRounds();
let courses = loadCourses();
let profiles = loadProfiles();
let activeProfileId = loadActiveProfile();
let draft = loadDraft();   // in-progress round
let tab = "play";

function loadRounds(){ try{return JSON.parse(localStorage.getItem(LS_ROUNDS))||[]}catch(e){return[]} }
function saveRoundsLocal(){ localStorage.setItem(LS_ROUNDS, JSON.stringify(rounds)); }
function saveRounds(){ saveRoundsLocal(); cloudPush(); }
function loadCourses(){ try{const c=JSON.parse(localStorage.getItem(LS_COURSES)); return (Array.isArray(c)&&c.length)?c:clone(SEED_COURSES);}catch(e){return clone(SEED_COURSES);} }
function saveCoursesLocal(){ localStorage.setItem(LS_COURSES, JSON.stringify(courses)); }
function saveCourses(){ saveCoursesLocal(); cloudPush(); }
function loadProfiles(){
  try{ const p=JSON.parse(localStorage.getItem(LS_PROFILES));
    if(Array.isArray(p)&&p.length) return p;
  }catch(e){}
  return [{id:1, name:"Me"}];
}
function saveProfilesLocal(){ localStorage.setItem(LS_PROFILES, JSON.stringify(profiles)); }
function saveProfiles(){ saveProfilesLocal(); cloudPush(); }
function loadActiveProfile(){
  const v=+localStorage.getItem(LS_ACTIVEPROF);
  return v||1;
}
function saveActiveProfileLocal(){ localStorage.setItem(LS_ACTIVEPROF, String(activeProfileId)); }
function activeProfile(){ return profiles.find(p=>p.id===activeProfileId)||profiles[0]; }
function myRounds(){ return rounds.filter(r=>(r.profileId||1)===activeProfileId); }
// One-time migration: tag any untagged rounds to the first profile.
function migrateProfiles(){
  let changed=false;
  rounds.forEach(r=>{ if(r.profileId==null){ r.profileId=profiles[0].id; changed=true; } });
  if(changed) saveRoundsLocal();
}
function loadBench(){ try{const b=JSON.parse(localStorage.getItem(LS_BENCH)); return b||clone(DEFAULT_BENCH)}catch(e){return clone(DEFAULT_BENCH)} }
function saveBenchLocal(){ localStorage.setItem(LS_BENCH, JSON.stringify(bench)); }
function saveBench(){ saveBenchLocal(); cloudPush(); }
function loadDraft(){ try{return JSON.parse(localStorage.getItem(LS_DRAFT))||null}catch(e){return null} }
function saveDraft(){ draft?localStorage.setItem(LS_DRAFT,JSON.stringify(draft)):localStorage.removeItem(LS_DRAFT); }
function clone(o){return JSON.parse(JSON.stringify(o));}

/* ===================== SETTINGS (theme, benchmark level, tee defaults) ===================== */
const LS_SETTINGS="sg_settings_v1";
const DEFAULT_SETTINGS={benchLevel:0, theme:"dark", teeDefaults:{}, onboarded:false};
let settings = loadSettings();
function loadSettings(){ try{return Object.assign({}, DEFAULT_SETTINGS, JSON.parse(localStorage.getItem(LS_SETTINGS))||{});}catch(e){return clone(DEFAULT_SETTINGS);} }
function saveSettingsLocal(){ localStorage.setItem(LS_SETTINGS, JSON.stringify(settings)); }
function saveSettings(){ saveSettingsLocal(); cloudPush(); }
const BENCH_LEVELS=[
  {id:0,label:"PGA Tour",factor:1.00},
  {id:1,label:"Scratch",factor:1.035},
  {id:2,label:"5 handicap",factor:1.07},
  {id:3,label:"10 handicap",factor:1.11},
  {id:4,label:"15 handicap",factor:1.16},
];
function benchLevel(){ return BENCH_LEVELS.find(b=>b.id===(settings.benchLevel||0))||BENCH_LEVELS[0]; }
function benchFactor(){ return benchLevel().factor; }
function applyTheme(){ document.documentElement.setAttribute("data-theme", settings.theme||"dark"); }

/* ===================== CLOUD FILE SYNC =====================
   Uses the File System Access API (Chrome/Edge desktop). You pick ONE
   .json file inside your OneDrive/Dropbox/Google Drive folder; the app
   then writes to it automatically on every change. Your cloud client
   syncs the file; other devices point at the same synced file.
   Handle is persisted in IndexedDB so it reconnects between sessions.
   ============================================================ */
const fsSupported = ('showSaveFilePicker' in window);
let cloudHandle=null, cloudStatus="off", cloudName="", cloudTimer=null;

// --- tiny IndexedDB helpers (to persist the file handle) ---
const IDB_NAME="sg_fs", IDB_STORE="handles";
function idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open(IDB_NAME,1);
  r.onupgradeneeded=()=>r.result.createObjectStore(IDB_STORE);
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function idbSet(k,v){ const db=await idb(); return new Promise((res,rej)=>{
  const t=db.transaction(IDB_STORE,"readwrite"); t.objectStore(IDB_STORE).put(v,k);
  t.oncomplete=()=>res(); t.onerror=()=>rej(t.error); }); }
async function idbGet(k){ const db=await idb(); return new Promise((res,rej)=>{
  const t=db.transaction(IDB_STORE,"readonly"); const rq=t.objectStore(IDB_STORE).get(k);
  rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error); }); }
async function idbDel(k){ const db=await idb(); return new Promise((res,rej)=>{
  const t=db.transaction(IDB_STORE,"readwrite"); t.objectStore(IDB_STORE).delete(k);
  t.oncomplete=()=>res(); t.onerror=()=>rej(t.error); }); }

function setCloud(status){ cloudStatus=status; updateCloudBadge(); }
function updateCloudBadge(){
  const el=document.getElementById("cloudBadge"); if(!el) return;
  if(sbActive()){
    const m={ on:["on","☁ synced"], saving:["saving","☁ saving…"], error:["error","☁ sync error"], off:["off","☁ cloud"] };
    const [cls,txt]=m[sbStatusVal]||m.off;
    el.className="cloudbadge "+cls; el.textContent=txt; el.onclick=null; el.style.cursor="default"; return;
  }
  const map={ off:["off","● local only"], on:["on","☁ synced"+(cloudName?" · "+cloudName:"")],
    saving:["saving","☁ saving…"], reconnect:["reconnect","☁ tap to reconnect"], error:["error","☁ sync error"] };
  const [cls,txt]=map[cloudStatus]||map.off;
  el.className="cloudbadge "+cls; el.textContent=txt;
  el.onclick = (cloudStatus==="reconnect")? cloudReconnect : null;
  el.style.cursor = (cloudStatus==="reconnect")?"pointer":"default";
}
async function ensurePerm(h,mode="readwrite"){

// Union-merge rounds by id (keeps the version with more holes on conflict)
function mergeRounds(a,b){
  const map=new Map();
  [...(a||[]),...(b||[])].forEach(r=>{ if(!r||r.id==null) return; const ex=map.get(r.id);
    if(!ex || (r.holes?.length||0)>(ex.holes?.length||0)) map.set(r.id,r); });
  return [...map.values()].sort((x,y)=>x.id-y.id);
}
// Union-merge by id; incoming (b) wins on conflict (latest edit).
function mergeById(a,b){
  const map=new Map();
  [...(a||[])].forEach(r=>{ if(r&&r.id!=null) map.set(r.id,r); });
  [...(b||[])].forEach(r=>{ if(r&&r.id!=null) map.set(r.id,r); });
  return [...map.values()];
}

function applyIncoming(d){

/* ===================== BENCHMARK LOOKUP ===================== */
// Expected strokes to hole out from a given lie/distance.
function expected(lie, dist){
  if(dist<=0) return 0;
  if(lie==="green") return interpPutt(dist);          // dist in feet
  if(lie==="penalty") return 0;                        // not used directly
  const col = bench.offGreen.cols.indexOf(lie);
  if(col<0) return interpOff("fairway", dist);
  // some lies (tee) lack short-range values -> fall back to fairway
  let v = interpOffCol(col, dist);
  if(v==null) v = interpOff("fairway", dist);
  return v;
}
function sortedKeys(obj){ return Object.keys(obj).map(Number).sort((a,b)=>a-b); }
function interpPutt(ft){
  const ks=sortedKeys(bench.putt);
  if(ft<=ks[0]) return bench.putt[ks[0]];
  if(ft>=ks[ks.length-1]) return bench.putt[ks[ks.length-1]];
  for(let i=0;i<ks.length-1;i++){
    if(ft>=ks[i]&&ft<=ks[i+1]){
      return lerp(ks[i],bench.putt[ks[i]],ks[i+1],bench.putt[ks[i+1]],ft);
    }
  }
  return bench.putt[ks[ks.length-1]];
}
function interpOff(lie,dist){ return interpOffCol(bench.offGreen.cols.indexOf(lie),dist); }
function interpOffCol(col,dist){
  const rows=bench.offGreen.rows;
  const ks=sortedKeys(rows).filter(k=>rows[k][col]!=null);
  if(ks.length===0) return null;
  if(dist<=ks[0]) return rows[ks[0]][col];
  if(dist>=ks[ks.length-1]) return rows[ks[ks.length-1]][col];
  for(let i=0;i<ks.length-1;i++){
    if(dist>=ks[i]&&dist<=ks[i+1]){
      return lerp(ks[i],rows[ks[i]][col],ks[i+1],rows[ks[i+1]][col],dist);
    }
  }
  return rows[ks[ks.length-1]][col];
}
function lerp(x0,y0,x1,y1,x){ return y0+(y1-y0)*(x-x0)/(x1-x0); }

/* ===================== SG CALCULATION ===================== */
// A shot stores the FINISH state (where the ball came to rest):
//   {lie, dist, penalty}  -- dist in yards (off green) or feet (green); holed => lie:"hole"
// The START of shot 1 is the tee. Start of shot n = finish of shot n-1.
function categorize(par, startLie, startDistYds){
  if(startLie==="tee" && par>=4) return "OTT";
  if(startLie==="green") return "PUTT";
  if(startLie!=="green" && startDistYds!=null && startDistYds<=30) return "ARG";
  return "APP"; // approach incl. par-3 tee shots & all long shots
}
// Convert a finish state into expected-strokes-before-NEXT-shot.
function stateExpected(state){
  if(state.lie==="hole") return 0;
  return expected(state.lie, state.dist);
}
function computeHole(hole){
  // build ordered states: start states for each shot
  const shots=hole.shots; // each = finish state
  const out=[];
  let startLie="tee", startDist=hole.teeYds, startUnit="yds";
  const f=benchFactor();
  for(let i=0;i<shots.length;i++){
    const finish=shots[i];
    const eBefore = ((startLie==="green")?interpPutt(startDist):expected(startLie,startDist))*f;
    const eAfter  = stateExpected(finish)*f;
    const pen = finish.penalty||0;
    const sg = eBefore - eAfter - 1 - pen;
    const startDistYds = startLie==="green"? (startDist/3) : startDist;
    const cat = categorize(hole.par, startLie, startLie==="green"?0:startDist);
    out.push({
      idx:i+1, startLie, startDist, startUnit,
      finish, penalty:pen, eBefore, eAfter, sg, cat
    });
    // next start = this finish
    startLie=finish.lie; startDist=finish.dist;
    startUnit = finish.lie==="green"?"ft":"yds";
  }
  return out;
}
function holeStrokes(hole){
  let s=hole.shots.length;
  for(const sh of hole.shots) s+=(sh.penalty||0);
  return s;
}
function roundTotals(round){
  const tot={OTT:0,APP:0,ARG:0,PUTT:0,total:0,strokes:0,par:0,holes:0};
  for(const h of round.holes){
    if(!h.shots||h.shots.length===0) continue;
    const rows=computeHole(h);
    for(const r of rows){ tot[r.cat]+=r.sg; tot.total+=r.sg; }
    tot.strokes+=holeStrokes(h); tot.par+=h.par; tot.holes++;
  }
  return tot;
}

/* Build a plausible shot sequence from score + putts + fairway-hit so SG & all stats work. */
function synthesizeHole(par, teeYds, score, putts, firHit, penalties){
  penalties=Math.max(0,penalties|0); putts=Math.max(0,putts|0); score=Math.max(1,score|0);
  let nonPutt=score - putts - penalties;
  if(nonPutt<1) nonPutt=1;
  const gir = nonPutt <= (par-2);
  const firstPutt = putts<=1?7 : putts===2?22 : 38;   // feet
  const shots=[];
  const offCount=nonPutt-1; // shots finishing OFF the green (last non-putt finishes on green)
  const startD = Math.max(60, Math.min(teeYds*0.42, 230));
  for(let k=0;k<offCount;k++){
    let lie = (k===0 && par>=4) ? (firHit?"fairway":"rough") : "fairway";
    const frac=(k+1)/offCount;
    let d=Math.round(startD*(1-frac) + (gir?0:10)*frac);
    if(!gir && k===offCount-1){ d=Math.max(8,Math.min(25,d||15)); } // greenside, sets up a chip
    shots.push({lie, dist:d, penalty: k===0?penalties:0});
  }
  if(putts===0){
    shots.push({lie:"hole", dist:0, penalty: offCount===0?penalties:0});
  } else {
    shots.push({lie:"green", dist:firstPutt, penalty: offCount===0?penalties:0});
    for(let i=0;i<putts;i++){
      if(i===putts-1) shots.push({lie:"hole", dist:0, penalty:0});
      else shots.push({lie:"green", dist: i===0?Math.max(2,Math.round(firstPutt*0.25)):3, penalty:0});
    }
  }
  return shots;
}

/* Auto strengths/weaknesses sentence from per-18 category values */
function insightSentence(per18vals){
  const cats=["OTT","APP","ARG","PUTT"];
  const pairs=cats.map((c,i)=>({c,v:per18vals[i]}));
  const best=pairs.slice().sort((a,b)=>b.v-a.v)[0];
  const worst=pairs.slice().sort((a,b)=>a.v-b.v)[0];
  if(best.c===worst.c) return `Your game is well balanced right now — keep logging rounds to surface trends.`;
  const gap=best.v-worst.v;
  return `Your strength is <b>${CAT_LABEL[best.c]}</b> (${fmt(best.v)}/18); your biggest leak is <b>${CAT_LABEL[worst.c]}</b> (${fmt(worst.v)}/18), about <b>${gap.toFixed(1)}</b> shots/18 behind it. Closing that gap is your fastest path to scratch.`;
}

function holeIsComplete(h){ return h.shots && h.shots.length && h.shots[h.shots.length-1].lie==="hole"; }
const PUTT_BANDS=[["3-5 ft",3,5],["6-10 ft",6,10],["11-20 ft",11,20],["21+ ft",21,9999]];

function computeHoleStats(h){
  if(!h.shots||!h.shots.length) return null;
  const rows=computeHole(h);
  const par=h.par;
  const complete=holeIsComplete(h);
  const score=holeStrokes(h);
  const penalties=rows.reduce((a,r)=>a+(r.penalty||0),0);
  const puttRows=rows.filter(r=>r.startLie==="green");
  const putts=puttRows.length;
  const firstPuttIdx=rows.findIndex(r=>r.startLie==="green");
  let strokesToGreen=null, gir=false;
  if(firstPuttIdx>=0){
    strokesToGreen=0;
    for(let i=0;i<firstPuttIdx;i++) strokesToGreen+=1+(rows[i].penalty||0);
    gir = strokesToGreen <= par-2;
  }
  const firApp = par>=4;
  const firHit = firApp && rows.length ? rows[0].finish.lie==="fairway" : false;
  // driving distance (par>=4 tee shot, driver or unspecified)
  let drive=null;
  if(par>=4 && rows.length){
    const f=rows[0].finish;
    const rem = f.lie==="hole"?0 : f.lie==="green"? f.dist/3 : f.dist;
    const d=(h.teeYds||0)-rem;
    const club=h.shots[0].club;
    if((club==="driver"||!club) && d>30) drive=d;
  }
  const prox = rows.filter(r=>r.cat==="APP" && r.finish.lie==="green").map(r=>r.finish.dist);
  const puttAttempts = puttRows.map(r=>({dist:r.startDist, made:r.finish.lie==="hole"}));
  const hadSand = rows.some(r=>r.startLie==="sand" && r.startDist<=50);
  const penTypes = rows.filter(r=>r.penalty>0 && r.finish.penType).map(r=>r.finish.penType);
  const diff=score-par;
  return {par,score,diff,complete,penalties,putts,gir,firApp,firHit,drive,prox,
    puttAttempts,hadSand,onePutt:putts===1,threePutt:putts>=3,penTypes,
    sgRows:rows};
}

function aggregateStats(rnds){
  const A={rounds:rnds.length,holes:0,par:0,score:0,
    firApp:0,firHit:0,girHit:0,putts:0,onePutt:0,threePutt:0,penalties:0,
    scrApp:0,scrHit:0,sandApp:0,sandHit:0,drives:[],prox:[],
    buckets:{eagle:0,birdie:0,par:0,bogey:0,dbl:0},
    puttBands:PUTT_BANDS.map(b=>({label:b[0],att:0,made:0})),
    penTypes:{ob:0,water:0,lost:0,unplayable:0,other:0}};
  rnds.forEach(r=>{
    (r.holes||[]).forEach(h=>{
      const s=computeHoleStats(h); if(!s) return;
      A.holes++; A.par+=s.par; A.score+=s.score; A.putts+=s.putts; A.penalties+=s.penalties;
      if(s.firApp){ A.firApp++; if(s.firHit) A.firHit++; }
      if(s.gir) A.girHit++;
      if(s.onePutt) A.onePutt++;
      if(s.threePutt) A.threePutt++;
      if(s.drive!=null) A.drives.push(s.drive);
      s.prox.forEach(p=>A.prox.push(p));
      s.puttAttempts.forEach(pa=>{
        for(let i=0;i<PUTT_BANDS.length;i++){
          if(pa.dist>=PUTT_BANDS[i][1] && pa.dist<=PUTT_BANDS[i][2]){
            A.puttBands[i].att++; if(pa.made) A.puttBands[i].made++; break;
          }
        }
      });
      s.penTypes.forEach(t=>{ if(A.penTypes[t]!=null) A.penTypes[t]++; });
      if(s.complete){
        if(!s.gir){ A.scrApp++; if(s.diff<=0) A.scrHit++; }
        if(s.hadSand){ A.sandApp++; if(s.diff<=0) A.sandHit++; }
        const d=s.diff;
        if(d<=-2) A.buckets.eagle++; else if(d===-1) A.buckets.birdie++;
        else if(d===0) A.buckets.par++; else if(d===1) A.buckets.bogey++; else A.buckets.dbl++;
      }
    });
  });
  return A;
}

function pct(n,d){ return d? Math.round(n/d*100) : null; }
function avg(arr){ return arr.length? arr.reduce((a,b)=>a+b,0)/arr.length : null; }
function statCard(k,v,sub){ return `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div>${sub?`<div class="k" style="margin-top:2px">${sub}</div>`:""}</div>`; }

  const A=aggregateStats(mine);
  const per18=n=>A.holes? n/A.holes*18 : 0;
  const firPctV=pct(A.firHit,A.firApp);
  const girPctV=pct(A.girHit,A.holes);
  const scrPctV=pct(A.scrHit,A.scrApp);
  const sandPctV=pct(A.sandHit,A.sandApp);
  const avgScoreVsPar = A.holes? (A.score-A.par)/A.holes*18 : 0;
  const drv=avg(A.drives), prox=avg(A.prox);
  const totalPenTypes=Object.values(A.penTypes).reduce((a,b)=>a+b,0);

  main.innerHTML=`
  <div class="card">
    <div class="hole-head"><h2 style="margin:0">${esc(prof.name)} · key numbers</h2>
      <span class="pill">${A.rounds} round${A.rounds>1?"s":""} · ${A.holes} holes</span></div>
    <div class="statgrid">
      ${statCard("Scoring avg / 18", A.holes?fmt(avgScoreVsPar,1):"—", "vs par")}
      ${statCard("Handicap", prof.handicap!=null?prof.handicap:"—", "Target: "+(prof.target!=null?prof.target:"—"))}
      ${statCard("Putts / 18", A.holes?per18(A.putts).toFixed(1):"—", A.threePutt+" three-putt"+(A.threePutt===1?"":"s"))}
      ${statCard("Penalties / 18", A.holes?per18(A.penalties).toFixed(1):"—", totalPenTypes?"":"add types as you log")}
    </div>
    <div class="btnrow"><button class="btn secondary small" id="editgoals">Edit handicap & target</button></div>
    <label style="margin-top:10px">Compare strokes-gained against</label>
    <select id="benchpick">${BENCH_LEVELS.map(b=>`<option value="${b.id}" ${b.id===benchLevel().id?"selected":""}>${b.label}</option>`).join("")}</select>
    <div class="hint" style="margin-top:4px">Raises the baseline so your bars aren't all negative. Affects strokes-gained only.</div>
  </div>

  ${rollingFormCard(mine)}

  <div class="card">
    <h2>📈 Strokes-gained trend (per 18)</h2>
    ${trendChart(mine)}
  </div>

  ${goalChartCard(prof)}

  <div class="card">
    <h2>🎯 Tee-to-green accuracy</h2>
    ${gauge("Fairways in regulation", firPctV, A.firApp?`${A.firHit}/${A.firApp}`:"")}
    ${gauge("Greens in regulation", girPctV, `${A.girHit}/${A.holes}`)}
    ${gauge("Scrambling (par save, no GIR)", scrPctV, A.scrApp?`${A.scrHit}/${A.scrApp}`:"")}
    ${gauge("Sand saves (greenside)", sandPctV, A.sandApp?`${A.sandHit}/${A.sandApp}`:"no bunker holes yet")}
    <div class="statgrid" style="margin-top:12px">
      ${statCard("Avg drive", drv!=null?Math.round(drv)+" y":"—", "driver / par 4-5")}
      ${statCard("Approach proximity", prox!=null?Math.round(prox)+" ft":"—", "greens hit")}
    </div>
    <div class="hint" style="margin-top:6px">Driving uses hole length minus distance left, so it's a straight-line estimate. Tag your tee club when logging for cleaner driver numbers.</div>
  </div>

  <div class="card">
    <h2>⛳ Putting by distance</h2>
    <table><thead><tr><th>Distance</th><th class="num">Attempts</th><th class="num">Make %</th></tr></thead>
      <tbody>${puttRows}</tbody></table>
    <div class="statgrid" style="margin-top:12px">
      ${statCard("1-putt holes", A.onePutt, pct(A.onePutt,A.holes)+"% of holes")}
      ${statCard("3-putt holes", A.threePutt, pct(A.threePutt,A.holes)+"% of holes")}
    </div>
  </div>

  <div class="card">
    <h2>📊 Scoring breakdown</h2>
    ${bkRow("Eagle or better", bk.eagle, "#7fffc4")}
    ${bkRow("Birdie", bk.birdie, "var(--good)")}
    ${bkRow("Par", bk.par, "#7fd3ff")}
    ${bkRow("Bogey", bk.bogey, "var(--warn)")}
    ${bkRow("Double bogey +", bk.dbl, "var(--bad)")}
    <div class="hint" style="margin-top:6px">Based on ${totB} completed hole${totB===1?"":"s"}. Birdies + eliminating doubles is the fastest path from 7 to scratch.</div>
  </div>

  ${totalPenTypes?`<div class="card">
    <h2>⚠ Penalty breakdown</h2>
    <div class="statgrid">
      ${statCard("Out of bounds", A.penTypes.ob, "")}
      ${statCard("Water", A.penTypes.water, "")}
      ${statCard("Lost ball", A.penTypes.lost, "")}
      ${statCard("Unplayable", A.penTypes.unplayable, "")}
    </div></div>`:""}
  `;

  if($("#editgoals")) $("#editgoals").onclick=()=>editGoals(prof.id);
  if($("#benchpick")) $("#benchpick").onchange=e=>{ settings.benchLevel=+e.target.value; saveSettings(); render(); };
}
function avgPer18(rnds){
  const a={OTT:0,APP:0,ARG:0,PUTT:0,total:0,holes:0};
  rnds.forEach(r=>{ const t=roundTotals(r); ["OTT","APP","ARG","PUTT","total"].forEach(k=>a[k]+=t[k]); a.holes+=t.holes; });
  const f=a.holes?18/a.holes:0;
  return {OTT:a.OTT*f,APP:a.APP*f,ARG:a.ARG*f,PUTT:a.PUTT*f,total:a.total*f,n:rnds.length};
}
function rollingFormCard(mine){
  const valid=mine.filter(r=>r.holes&&r.holes.length)
    .sort((a,b)=>(a.date||"").localeCompare(b.date||"")||a.id-b.id);
  if(valid.length<2) return "";
  const last5=avgPer18(valid.slice(-5));
  const all=avgPer18(valid);
  const cats=[["total","Total"],["OTT","OTT"],["APP","APP"],["ARG","ARG"],["PUTT","PUTT"]];
  const rows=cats.map(([k,lbl])=>{
    const d=last5[k]-all[k]; const arrow=d>=0.05?"▲":d<=-0.05?"▼":"▬";
    const col=d>=0.05?"sg-pos":d<=-0.05?"sg-neg":"muted";
    return `<tr><td>${lbl}</td><td class="num">${fmt(last5[k])}</td><td class="num">${fmt(all[k])}</td>
      <td class="num ${col}">${arrow} ${fmt(d)}</td></tr>`;
  }).join("");
  return `<div class="card">
    <h2>🔥 Recent form</h2>
    <div class="hint">Last ${Math.min(5,valid.length)} rounds vs your all-time average (SG per 18).</div>
    <table style="margin-top:8px"><thead><tr><th></th><th class="num">Last 5</th><th class="num">All-time</th><th class="num">Δ</th></tr></thead>
      <tbody>${rows}</tbody></table>
  </div>`;
}
function goalChartCard(prof){
  const hist=(prof.hcpHistory||[]).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  if(hist.length<2){
    return `<div class="card"><h2>🎯 Handicap goal</h2>
      <div class="hint">Current: <b>${prof.handicap!=null?prof.handicap:"—"}</b> · Target: <b>${prof.target!=null?prof.target:"—"}</b>.
      Update your handicap over time (button above) to build a progress chart toward your target.</div></div>`;
  }
  const W=320,H=170,padL=34,padR=8,padT=10,padB=22;
  const vals=hist.map(h=>h.value);
  const tgt=prof.target!=null?prof.target:Math.min(...vals);
  let lo=Math.min(tgt,...vals), hi=Math.max(tgt,...vals);
  if(lo===hi){lo-=1;hi+=1;} const pad=(hi-lo)*0.1; lo-=pad; hi+=pad;
  const x=i=>padL+(hist.length===1?0:i/(hist.length-1))*(W-padL-padR);
  const y=v=>padT+(1-(v-lo)/(hi-lo))*(H-padT-padB);
  const line=hist.map((h,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(h.value).toFixed(1)}`).join(" ");
  const dots=hist.map((h,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(h.value).toFixed(1)}" r="3" fill="#5fc882"/>`).join("");
  const tgtY=y(tgt).toFixed(1);
  return `<div class="card">
    <h2>🎯 Handicap toward target</h2>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
      <line x1="${padL}" y1="${tgtY}" x2="${W-padR}" y2="${tgtY}" stroke="#b69cff" stroke-dasharray="4 3"/>
      <text x="${W-padR}" y="${(+tgtY-4)}" fill="#b69cff" font-size="10" text-anchor="end">target ${tgt}</text>
      <path d="${line}" fill="none" stroke="#5fc882" stroke-width="2"/>${dots}
      <text x="${padL}" y="${padT+4}" fill="var(--muted)" font-size="10">${hi.toFixed(1)}</text>
      <text x="${padL}" y="${H-padB+10}" fill="var(--muted)" font-size="10">${lo.toFixed(1)}</text>
    </svg>
    <div class="hint">${hist.length} handicap entries · latest <b>${vals[vals.length-1]}</b>, target <b>${tgt}</b>.</div>
  </div>`;
}

function editGoals(id){
  const p=profiles.find(x=>x.id===id); if(!p) return;
  const h=prompt("Current handicap (e.g. 7 or 7.4):", p.handicap!=null?p.handicap:"");
  if(h===null) return;
  const t=prompt("Target handicap (e.g. 0 for scratch):", p.target!=null?p.target:"");
  if(t===null) return;
  p.handicap = h.trim()===""?null:parseFloat(h);
  p.target = t.trim()===""?null:parseFloat(t);
  if(p.handicap!=null && !isNaN(p.handicap)){
    p.hcpHistory = p.hcpHistory||[];
    const today=new Date().toISOString().slice(0,10);
    const last=p.hcpHistory[p.hcpHistory.length-1];
    if(last && last.date===today) last.value=p.handicap;
    else if(!last || last.value!==p.handicap) p.hcpHistory.push({date:today, value:p.handicap});
  }
  saveProfiles(); render();
}

/* Lightweight inline SVG line chart of SG/18 per round over time. */
function trendChart(rnds){
  const pts=[...rnds].filter(r=>r.holes&&r.holes.length)
    .sort((a,b)=>(a.date||"").localeCompare(b.date||"")||a.id-b.id)
    .map(r=>{ const t=roundTotals(r); const f=t.holes?18/t.holes:0;
      return {total:t.total*f,OTT:t.OTT*f,APP:t.APP*f,ARG:t.ARG*f,PUTT:t.PUTT*f}; });
  if(pts.length<2) return `<div class="hint">Log at least 2 rounds to see your trend line.</div>`;
  const W=320,H=170,padL=34,padR=8,padT=10,padB=22;
  const series=[
    {key:"total",col:"#5fc882",label:"Total",wide:true},
    {key:"OTT",col:"#7fd3ff",label:"OTT"},
    {key:"APP",col:"#b69cff",label:"APP"},
    {key:"ARG",col:"#ffce7f",label:"ARG"},
    {key:"PUTT",col:"#7fffc4",label:"PUTT"},
  ];
  let lo=Infinity,hi=-Infinity;
  pts.forEach(p=>series.forEach(s=>{ lo=Math.min(lo,p[s.key]); hi=Math.max(hi,p[s.key]); }));
  if(lo===hi){ lo-=1; hi+=1; }
  const pad=(hi-lo)*0.1; lo-=pad; hi+=pad;
  const x=i=>padL+(W-padL-padR)*(pts.length===1?0.5:i/(pts.length-1));
  const y=v=>padT+(H-padT-padB)*(1-(v-lo)/(hi-lo));
  const line=(key)=>pts.map((p,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(p[key]).toFixed(1)).join(" ");
  const zeroY = (lo<=0&&hi>=0)? y(0) : null;
  const grid = [hi, (hi+lo)/2, lo].map(v=>`<line x1="${padL}" y1="${y(v).toFixed(1)}" x2="${W-padR}" y2="${y(v).toFixed(1)}" stroke="#2a322c" stroke-width="1"/><text x="2" y="${(y(v)+3).toFixed(1)}" fill="#8aa094" font-size="9">${fmt(v,1)}</text>`).join("");
  const paths=series.map(s=>`<path d="${line(s.key)}" fill="none" stroke="${s.col}" stroke-width="${s.wide?2.4:1.3}" opacity="${s.wide?1:0.85}"/>`).join("");
  const dots=pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.total).toFixed(1)}" r="2.6" fill="#5fc882"/>`).join("");
  const legend=series.map(s=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:11px;color:var(--muted)"><span style="width:12px;height:3px;background:${s.col};display:inline-block;border-radius:2px"></span>${s.label}</span>`).join("");
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:280px;height:auto">
    ${grid}
    ${zeroY!=null?`<line x1="${padL}" y1="${zeroY.toFixed(1)}" x2="${W-padR}" y2="${zeroY.toFixed(1)}" stroke="#4a5750" stroke-width="1" stroke-dasharray="3 3"/>`:""}
    ${paths}${dots}
    <text x="${padL}" y="${H-6}" fill="#8aa094" font-size="9">oldest</text>
    <text x="${W-padR}" y="${H-6}" fill="#8aa094" font-size="9" text-anchor="end">latest</text>
  </svg></div>
  <div style="margin-top:6px">${legend}</div>
  <div class="hint" style="margin-top:4px">Each point is one round's strokes gained per 18 vs ${benchLevel().label}. Higher = better. Watch the lines climb as you improve.</div>`;
}

/* ===================== HISTORY TAB ===================== */
function renderHistory(){
  const mine=myRounds();
  if(!mine.length){ main.innerHTML=`<div class="card"><h2>No rounds yet for ${esc(activeProfile().name)}</h2></div>`; return; }
  let html=`<div class="card"><h2>Rounds</h2>
    <table><thead><tr><th>Date</th><th>Course</th><th class="num">Holes</th><th class="num">+/-</th><th class="num">SG</th></tr></thead><tbody>`;
  mine.slice().reverse().forEach(r=>{ const t=roundTotals(r);
    html+=`<tr data-id="${r.id}" class="rrow" style="cursor:pointer">
      <td>${r.date}</td><td>${esc(r.course||"—")}</td><td class="num">${t.holes}</td>
      <td class="num">${t.strokes-t.par>=0?"+":""}${t.strokes-t.par}</td>
      <td class="num ${sgClass(t.total)}">${fmt(t.total)}</td></tr>`; });
  html+=`</tbody></table></div><div id="detail"></div>`;
  main.innerHTML=html;
  document.querySelectorAll(".rrow").forEach(tr=>tr.onclick=()=>showRound(+tr.dataset.id));
}
function showRound(id){
  const r=rounds.find(x=>x.id===id); if(!r) return;
  const t=roundTotals(r);
  let holesHtml=r.holes.map((h,i)=>{
    const rows=computeHole(h);
    const shots=rows.map(s=>{
      const fin=s.finish; const finTxt=fin.lie==="hole"?"holed":`${LIE_LABEL[fin.lie]} ${fin.lie==="green"?fin.dist+"ft":fin.dist+"y"}`;
      return `<div class="shotline"><span class="idx">${s.idx}</span>
        <span class="desc"><span class="tag ${CAT_TAG[s.cat]}">${s.cat}</span> ${LIE_LABEL[s.startLie]} ${Math.round(s.startDist)}${s.startLie==="green"?"ft":"y"} → ${finTxt}</span>
        <span class="sg ${sgClass(s.sg)}">${fmt(s.sg)}</span></div>`;
    }).join("");
    return `<details><summary>Hole ${i+1} · par ${h.par} · ${holeStrokes(h)} strokes · <span class="${sgClass(rows.reduce((a,x)=>a+x.sg,0))}">${fmt(rows.reduce((a,x)=>a+x.sg,0))} SG</span></summary>${shots}</details>`;
  }).join("");
  const A=aggregateStats([r]);
  const fir=A.firApp?Math.round(A.firHit/A.firApp*100)+"%":"—";
  const gir=A.holes?Math.round(A.girHit/A.holes*100)+"%":"—";
  const scr=A.scrApp?Math.round(A.scrHit/A.scrApp*100)+"%":"—";
  $("#detail").innerHTML=`<div class="card">
    <div class="hole-head"><h2 style="margin:0">${r.date} · ${esc(r.course||"—")}</h2>
      <div class="headtools"><button class="btn secondary small" id="editround">✎ Edit</button><button class="btn danger small" id="del">Delete</button></div></div>
    <div class="statgrid" style="margin:6px 0 10px">
      ${["OTT","APP","ARG","PUTT"].map(c=>`<div class="stat"><div class="k">${CAT_LABEL[c]}</div><div class="v ${sgClass(t[c])}">${fmt(t[c])}</div></div>`).join("")}
    </div>
    <div class="stat" style="margin-bottom:10px"><div class="k">Total SG · Score</div><div class="v"><span class="${sgClass(t.total)}">${fmt(t.total)}</span> · ${t.strokes} (${t.strokes-t.par>=0?"+":""}${t.strokes-t.par})</div></div>
    <div class="statgrid" style="margin-bottom:10px">
      ${statCard("Fairways", fir, A.firApp?`${A.firHit}/${A.firApp}`:"")}
      ${statCard("Greens", gir, `${A.girHit}/${A.holes}`)}
      ${statCard("Putts", A.putts, A.threePutt+" three-putt"+(A.threePutt===1?"":"s"))}
      ${statCard("Penalties", A.penalties, "scrambling "+scr)}
    </div>
    ${holesHtml}
  </div>`;
  $("#editround").onclick=()=>editRound(id);
  $("#del").onclick=()=>deleteRoundWithUndo(id);
  $("#detail").scrollIntoView({behavior:"smooth"});
}
function deleteRoundWithUndo(id){
  const idx=rounds.findIndex(x=>x.id===id);
  if(idx<0) return;
  const removed=rounds[idx];
  rounds.splice(idx,1); saveRounds(); renderHistory();
  toast("Round deleted.","Undo",()=>{ rounds.splice(Math.min(idx,rounds.length),0,removed); saveRounds(); renderHistory(); });
}

    <h2>☁ Cloud file sync <span class="muted" style="font-weight:400">(desktop Chrome/Edge)</span></h2>
    <div class="hint">${statusTxt}</div>
    <div class="hint" style="margin-top:6px">Pick one <b>.json</b> file inside your <b>OneDrive / Dropbox / Google Drive</b> folder. The app then writes to it automatically on every change, and your cloud app syncs it everywhere. On another device, install this same page and connect it to the <i>same synced file</i>.</div>
    <div class="btnrow">
      ${!connected
        ? `<button class="btn" id="cloudconnect">🔗 Connect cloud file</button>`
        : `        <button class="btn secondary" id="cloudpull">⬇ Load from file</button>
           <button class="btn secondary" id="cloudsave">⬆ Save now</button>`}
    </div>
    ${connected?`<div class="btnrow">
        ${cloudStatus==="reconnect"?`<button class="btn" id="cloudreconnect">Reconnect</button>`:``}
        <button class="btn danger small" id="clouddisc">Disconnect file</button>
      </div>`:``}
    <div class="hint" style="margin-top:8px"><b>How multi-device works:</b> all devices read/write the same synced file. New rounds merge together by ID. Note: <i>deletions don't propagate across devices</i> (a round deleted on one device may return from another's copy) — by design, to avoid accidental data loss.</div>
  </div>
  <div class="card">
    <h2>👤 Profiles</h2>
    <div class="hint">Each profile tracks its own rounds and strokes-gained progress. Switch the active profile from the selector at the top.</div>
    <div id="profileList" style="margin-top:8px"></div>
    <div class="btnrow"><button class="btn secondary small" id="addprofile">＋ Add profile</button></div>
  </div>
  <div class="card">
    <h2>⛳ Course library</h2>
    <div class="hint">Pick a course when starting a round to auto-fill every hole. Edit a course below, or use “Save as course” mid-round to capture your exact layout.</div>
    <div id="courseList" style="margin-top:8px"></div>
    <div class="btnrow"><button class="btn secondary small" id="addcourse">＋ New blank course</button>
      <button class="btn secondary small" id="resetcourses">Restore seed courses</button></div>
    <div class="hint" style="margin-top:8px">⚠ Irish courses are seeded with the correct <b>total par</b> but a <b>standard</b> hole layout (not the official card). Edit pars/yardages to match, then they're saved as yours.</div>
  </div>
  <div class="card">
    <h2>Manual backup & restore</h2>
    <div class="hint">Works in any browser. Even with cloud sync on, an occasional manual export is a good safety net.</div>
    <div class="btnrow">
      <button class="btn" id="export">⬇ Export JSON</button>
      <button class="btn secondary" id="importbtn">⬆ Import JSON</button>
    </div>
    <input type="file" id="importfile" accept="application/json" style="display:none">
    <div class="btnrow"><button class="btn secondary small" id="csv">Export rounds as CSV</button></div>
  </div>
  <div class="card">
    <h2>Benchmark tables</h2>
    <div class="hint">Strokes-gained is measured against these PGA Tour expected-strokes values (Broadie). You can reset them if needed. Advanced: edit <code>DEFAULT_BENCH</code> in the file to change the baseline.</div>
    <div class="btnrow"><button class="btn danger small" id="resetbench">Reset benchmarks to default</button></div>
  </div>
  <div class="card">
    <h2>Danger zone</h2>
    <div class="hint">Deletes rounds only for the active profile.</div>
    <div class="btnrow"><button class="btn danger" id="wipe">Delete this profile's rounds</button></div>
  </div>`;
  if($("#cloudconnect")) $("#cloudconnect").onclick=cloudConnect;
  if($("#cloudpull")) $("#cloudpull").onclick=async()=>{ await cloudPull(false); alert("Loaded latest from file."); };
  wireSbCard();
  if($("#cloudsave")) $("#cloudsave").onclick=async()=>{ if(await cloudWriteNow()) alert("Saved to file."); };
  if($("#cloudreconnect")) $("#cloudreconnect").onclick=cloudReconnect;
  if($("#clouddisc")) $("#clouddisc").onclick=()=>{ if(confirm("Disconnect the cloud file? Your data stays in this browser; the file just stops auto-updating.")) cloudDisconnect(); };
  $("#export").onclick=exportJSON;
  $("#importbtn").onclick=()=>$("#importfile").click();
  $("#importfile").onchange=importJSON;
  $("#csv").onclick=exportCSV;
  $("#resetbench").onclick=()=>{ if(confirm("Reset benchmark tables to defaults?")){ bench=clone(DEFAULT_BENCH); saveBench(); alert("Reset done."); } };
  $("#wipe").onclick=()=>{ const nm=activeProfile().name;
    if(confirm(`Delete all rounds for "${nm}"? This cannot be undone.`)){
      rounds=rounds.filter(r=>(r.profileId||1)!==activeProfileId); saveRounds(); alert("Deleted."); render(); } };
  renderCourseList();
  renderProfileList();
  if($("#addprofile")) $("#addprofile").onclick=addProfile;
  if($("#addcourse")) $("#addcourse").onclick=()=>{
    const name=prompt("New course name:"); if(!name) return;
    courses.push({id:Date.now(), name, region:"Mine", verified:true, par:72, holes:holesFromPars(BASE_PARS[72])});
    saveCourses(); renderData();
  };
  if($("#resetcourses")) $("#resetcourses").onclick=()=>{
    if(confirm("Restore the built-in seed courses? Your own saved courses are kept.")){
      const mine=courses.filter(c=>c.region==="Mine");
      courses=mergeById(clone(SEED_COURSES), mine); saveCourses(); renderData();
    }
  };
}
function renderCourseList(){
  const el=$("#courseList"); if(!el) return;
  if(!courses.length){ el.innerHTML=`<div class="hint">No courses yet.</div>`; return; }
  const order={Mine:0,Ireland:1,Template:2};
  const sorted=[...courses].sort((a,b)=>(order[a.region||"Mine"]-order[b.region||"Mine"])||a.name.localeCompare(b.name));
  el.innerHTML=sorted.map(c=>{
    const par=c.par||c.holes.reduce((a,h)=>a+h.par,0);
    const yards=c.holes.reduce((a,h)=>a+(h.yds||0),0);
    const tag=c.region==="Ireland"?`<span class="tag arg">IE</span>`:c.region==="Template"?`<span class="tag">tmpl</span>`:`<span class="tag putt">mine</span>`;
    return `<details data-id="${c.id}">
      <summary>${tag} ${esc(c.name)} · par ${par} · ${yards}y${c.verified===false?` <span class="tag" style="color:var(--warn);border-color:#735c2f">default</span>`:``}</summary>
      <div style="overflow-x:auto"><table style="margin-top:8px"><thead><tr><th>Hole</th>${c.holes.map((_,i)=>`<th class="num">${i+1}</th>`).join("")}</tr></thead>
        <tbody>
          <tr><td>Par</td>${c.holes.map((h,i)=>`<td class="num"><input data-c="${c.id}" data-i="${i}" data-k="par" type="number" value="${h.par}" style="width:42px;padding:4px"></td>`).join("")}</tr>
          <tr><td>Yds</td>${c.holes.map((h,i)=>`<td class="num"><input data-c="${c.id}" data-i="${i}" data-k="yds" type="number" value="${h.yds||0}" style="width:48px;padding:4px"></td>`).join("")}</tr>
        </tbody></table></div>
      <div class="btnrow" style="margin-top:8px"><button class="btn secondary small editname" data-id="${c.id}">Rename</button>
        <button class="btn danger small delcourse" data-id="${c.id}">Delete</button></div>
    </details>`;
  }).join("");
  el.querySelectorAll('input[data-c]').forEach(inp=>{
    inp.onchange=()=>{
      const c=courses.find(x=>String(x.id)===inp.dataset.c); if(!c) return;
      const i=+inp.dataset.i, k=inp.dataset.k, v=+inp.value||0;
      c.holes[i][k]=v; c.par=c.holes.reduce((a,h)=>a+h.par,0);
      if(c.region==="Ireland") c.verified=true; // user has corrected it
      saveCourses();
    };
  });
  el.querySelectorAll('.delcourse').forEach(b=>b.onclick=()=>{
    if(confirm("Delete this course?")){ courses=courses.filter(x=>String(x.id)!==b.dataset.id); saveCourses(); renderData(); }
  });
  el.querySelectorAll('.editname').forEach(b=>b.onclick=()=>{
    const c=courses.find(x=>String(x.id)===b.dataset.id); if(!c) return;
    const n=prompt("Rename course:",c.name); if(n){ c.name=n; saveCourses(); renderData(); }
  });
}
function renderProfileList(){
  const el=$("#profileList"); if(!el) return;
  el.innerHTML=profiles.map(p=>{
    const n=rounds.filter(r=>(r.profileId||1)===p.id).length;
    const active=p.id===activeProfileId;
    const goals = (p.handicap!=null||p.target!=null)?` <span class="muted">· hcp ${p.handicap!=null?p.handicap:"—"} → ${p.target!=null?p.target:"—"}</span>`:"";
    return `<div class="shotline">
      <span class="desc">${active?"● ":""}${esc(p.name)} <span class="muted">· ${n} round${n===1?"":"s"}</span>${goals}</span>
      <span>
        <button class="btn secondary small goalsprof" data-id="${p.id}">Goals</button>
        <button class="btn secondary small renameprof" data-id="${p.id}">Rename</button>
        <button class="btn danger small delprof" data-id="${p.id}"${profiles.length<=1?" disabled":""}>Delete</button>
      </span></div>`;
  }).join("");
  el.querySelectorAll('.goalsprof').forEach(b=>b.onclick=()=>editGoals(+b.dataset.id));
  el.querySelectorAll('.renameprof').forEach(b=>b.onclick=()=>renameProfile(+b.dataset.id));
  el.querySelectorAll('.delprof').forEach(b=>b.onclick=()=>deleteProfile(+b.dataset.id));
}
function exportJSON(){
  const blob=new Blob([JSON.stringify({rounds,bench,courses,profiles,activeProfileId,settings},null,2)],{type:"application/json"});
  download(blob, `sg-tracker-${new Date().toISOString().slice(0,10)}.json`);
}
function importJSON(e){
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result);
    if(Array.isArray(d.profiles)&&d.profiles.length){ profiles=mergeById(profiles,d.profiles); saveProfiles();
      if(!profiles.some(p=>p.id===activeProfileId)){ activeProfileId=profiles[0].id; saveActiveProfileLocal(); } }
    if(Array.isArray(d.rounds)){ rounds=d.rounds; migrateProfiles(); saveRounds(); }
    if(Array.isArray(d.courses)){ courses=mergeById(courses,d.courses); saveCourses(); }
    if(d.bench){ bench=d.bench; saveBench(); }
    if(d.settings){ settings=Object.assign({}, DEFAULT_SETTINGS, d.settings); saveSettings(); applyTheme(); }
    renderProfileSelector();
    alert("Imported."); render();
  }catch(err){ alert("Invalid file."); } };
  rd.readAsText(f);
}
function exportCSV(){
  let csv="date,course,hole,par,shot,category,start_lie,start_dist,finish_lie,finish_dist,penalty,sg\n";
  rounds.forEach(r=>r.holes.forEach((h,hi)=>{
    computeHole(h).forEach(s=>{
      const fin=s.finish;
      csv+=[r.date,'"'+(r.course||"")+'"',hi+1,h.par,s.idx,s.cat,s.startLie,
        Math.round(s.startDist),fin.lie,fin.lie==="hole"?0:fin.dist,s.penalty,s.sg.toFixed(3)].join(",")+"\n";
    });
  }));
  download(new Blob([csv],{type:"text/csv"}), `sg-rounds-${new Date().toISOString().slice(0,10)}.csv`);
}
function download(blob,name){
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
}

/* ===================== HELP TAB ===================== */
function renderHelp(){
  main.innerHTML=`
  <div class="card">
    <h2>How it works</h2>
    <div class="hint">
      <p>For every shot you simply record <b>where the ball finished</b> (lie + distance to the pin). The app knows where you started (tee for shot 1, the previous finish for every shot after), looks up the Tour <b>expected strokes</b> for both positions, and computes:</p>
      <p style="text-align:center"><b>Strokes Gained = E(before) − E(after) − 1 − penalties</b></p>
      <p>Positive = better than a Tour pro from that spot; negative = worse. Each shot is bucketed into one of four categories.</p>
    </div>
  </div>
  <div class="card">
    <h2>The four categories</h2>
    <p><span class="tag ott">OTT</span> <b>Off the Tee</b> — tee shots on par 4s & 5s.</p>
    <p><span class="tag app">APP</span> <b>Approach</b> — shots from &gt;30 yds (incl. par-3 tee shots).</p>
    <p><span class="tag arg">ARG</span> <b>Around the Green</b> — shots ≤30 yds, not on the green.</p>
    <p><span class="tag putt">PUTT</span> <b>Putting</b> — shots on the green (distance in feet).</p>
  </div>
  <div class="card">
    <h2>Logging tips for clean data</h2>
    <div class="hint">
      <ul style="padding-left:18px;margin:6px 0">
        <li>Off the green, enter distance in <b>yards</b>. On the green, switch to <b>feet</b>.</li>
        <li>Record <b>penalty strokes</b> on the shot that incurred them (e.g. tee shot OB = 1 penalty, then play your finish position).</li>
        <li>“Recovery” = punch-out from trees / no clear shot.</li>
        <li>Log every round the same day while you remember distances. ~8–10 rounds gives trustworthy trends.</li>
      </ul>
    </div>
  </div>
  <div class="card">
    <h2>📊 The Stats tab</h2>
    <div class="hint">Beyond strokes gained, the <b>Stats</b> tab computes traditional metrics from the same shot data: fairways & greens in regulation, scrambling, sand saves, putts per 18, 1-/3-putt rates, make % by distance, driving distance, approach proximity, scoring breakdown (birdies→doubles), penalty types, and an SG trend chart over time. Set each profile's handicap & target there to track progress to scratch.</div>
  </div>
  <div class="card">
    <h2>Reading your numbers (7 → scratch)</h2>
    <div class="hint">All amateur SG-vs-Tour numbers are negative. Ignore the absolute values; compare the <b>bars to each other</b>. Whichever category is most negative per 18 is your highest-ROI practice area. Re-check every 5 rounds and re-aim your practice.</div>
    <div class="footnote">Benchmark: PGA Tour expected-strokes tables from Mark Broadie, <i>Every Shot Counts</i> (values approximate/reproduced). Editable in the Data tab / source file.</div>
  </div>`;
}

/* ===================== UTIL ===================== */
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* Toast with optional undo action */
let toastTimer=null;
function toast(msg, actionLabel, actionFn, ms=5000){
  let el=document.getElementById("toast");
  if(!el){ el=document.createElement("div"); el.id="toast"; el.className="toast"; document.body.appendChild(el); }
  el.innerHTML=`<span>${msg}</span>`;
  if(actionLabel){ const b=document.createElement("button"); b.textContent=actionLabel;
    b.onclick=()=>{ hideToast(); actionFn&&actionFn(); }; el.appendChild(b); }
  el.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(hideToast, ms);
}
function hideToast(){ const el=document.getElementById("toast"); if(el) el.classList.remove("show"); }

/* Theme toggle */
function setupTheme(){
  applyTheme();
  const b=document.getElementById("themeBtn");
  if(b){ b.textContent = (settings.theme==="light")?"☀️":"🌙";
    b.onclick=()=>{ settings.theme = (settings.theme==="light")?"dark":"light";
      saveSettings(); applyTheme(); b.textContent=(settings.theme==="light")?"☀️":"🌙"; }; }
}

/* Auto-pull latest cloud data when the app regains focus (multi-device freshness) */
let lastPull=Date.now();
function setupAutoPull(){
  const tryPull=()=>{
    if(document.visibilityState!=="visible") return;
    if(Date.now()-lastPull < 4000) return;   // debounce
    lastPull=Date.now();
    if(sbActive()) sbPull(true).then(ok=>{ if(ok && tab!=="play") render(); }).catch(()=>{});
    if(cloudHandle) cloudPull(true).then(ok=>{ if(ok && tab!=="play") render(); }).catch(()=>{});
  };
  document.addEventListener("visibilitychange", tryPull);
  window.addEventListener("focus", tryPull);
}

/* First-run onboarding + iOS install hint */
function maybeOnboard(){
  if(settings.onboarded) return;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
  let msg="👋 Welcome! Log each shot by where it finished — the app does the strokes-gained maths. Set your handicap & target in the Stats tab.";
  if(isIOS && !standalone) msg+=" To install: tap Share → Add to Home Screen.";
  settings.onboarded=true; saveSettings();
  setTimeout(()=>toast(msg, "Got it", null, 9000), 600);
}

migrateProfiles();
renderProfileSelector();
setupTheme();
render();
updateCloudBadge();
cloudInit();
sbInit();
setupAutoPull();
maybeOnboard();

/* ===================== PWA: install + service worker ===================== */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault(); deferredPrompt=e;
  const b=document.getElementById("installBtn"); if(b) b.style.display="block";
});
const installBtn=document.getElementById("installBtn");
if(installBtn){
  installBtn.onclick=async()=>{
    if(!deferredPrompt){
      alert("To install: in your browser menu choose “Install app” / “Add to Home Screen”.");
      return;
    }
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null; installBtn.style.display="none";
  };
}
window.addEventListener("appinstalled",()=>{ const b=document.getElementById("installBtn"); if(b) b.style.display="none"; });
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}

</script>
